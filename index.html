<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1e5631">
<title>The Griff — Cart Tracker</title>
</head>
<body>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --green: #1e5631;
    --green-dark: #143d22;
    --green-head-text: #ffffff;
    --spot-filled: #e8f2ea;
    --line: #4a4a44;
    --paper: #f7f7f2;
    --card: #ffffff;
    --ink: #22221e;
    --ink-soft: #6b6b62;
    --red: #c0392b;
    --red-soft: #fdeeec;
    --bar-bg: #ffffff;
    --bar-border: #ddddd4;
    --heading: #143d22;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --green: #163f24;
      --green-dark: #9fc7ab;
      --spot-filled: #24382a;
      --line: #6b6b60;
      --paper: #191a17;
      --card: #22231f;
      --ink: #e8e8e0;
      --ink-soft: #9a9a8e;
      --red: #e06052;
      --red-soft: #3c2522;
      --bar-bg: #22231f;
      --bar-border: #3a3b34;
      --heading: #9fc7ab;
    }
  }
  :root[data-theme="light"] {
    --green: #1e5631;
    --green-dark: #143d22;
    --spot-filled: #e8f2ea;
    --line: #4a4a44;
    --paper: #f7f7f2;
    --card: #ffffff;
    --ink: #22221e;
    --ink-soft: #6b6b62;
    --red: #c0392b;
    --red-soft: #fdeeec;
    --bar-bg: #ffffff;
    --bar-border: #ddddd4;
    --heading: #143d22;
  }
  :root[data-theme="dark"] {
    --green: #163f24;
    --green-dark: #9fc7ab;
    --spot-filled: #24382a;
    --line: #6b6b60;
    --paper: #191a17;
    --card: #22231f;
    --ink: #e8e8e0;
    --ink-soft: #9a9a8e;
    --red: #e06052;
    --red-soft: #3c2522;
    --bar-bg: #22231f;
    --bar-border: #3a3b34;
    --heading: #9fc7ab;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  header.app-head {
    background: var(--green);
    color: var(--green-head-text);
    padding: 12px 16px 0;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 6px rgba(0,0,0,.25);
  }
  .head-row { display: flex; align-items: center; justify-content: center; gap: 12px; }
  .logo-crest { flex: none; width: 58px; height: 47px; }
  .app-head h1 { font-size: 1.15rem; letter-spacing: .5px; text-align: left; }
  .app-head .date { text-align: left; font-size: .75rem; opacity: .85; margin-top: 2px; }
  .tabs { display: flex; margin-top: 10px; }
  .tab {
    flex: 1; text-align: center; padding: 10px 4px;
    font-size: .95rem; font-weight: 600;
    color: rgba(255,255,255,.7);
    border: none; background: none; cursor: pointer;
    border-bottom: 3px solid transparent;
  }
  .tab.active { color: #fff; border-bottom-color: #fff; }
  .tab:focus-visible { outline: 2px solid #fff; outline-offset: -2px; }

  main { padding: 14px 10px 90px; max-width: 900px; margin: 0 auto; }
  .page { display: none; }
  .page.active { display: block; }

  .sheet-title {
    text-align: center; font-weight: 700; font-size: 1.05rem;
    letter-spacing: 2px; margin-bottom: 4px; color: var(--heading);
  }
  .hint { text-align: center; font-size: .75rem; color: var(--ink-soft); margin-bottom: 12px; }

  .lot-tools { display: flex; justify-content: center; margin-bottom: 12px; }
  .erase-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 18px;
    font-size: .9rem; font-weight: 600;
    border: 1.5px solid var(--red); border-radius: 8px;
    background: var(--card); color: var(--red);
    cursor: pointer;
  }
  .erase-btn .x { font-size: 1.05rem; font-weight: 700; }
  .erase-btn.active { background: var(--red); color: #fff; }
  .erase-btn:focus-visible { outline: 2px solid var(--red); outline-offset: 2px; }
  .erase-banner {
    display: none;
    text-align: center; font-size: .8rem; font-weight: 600;
    color: var(--red); margin-bottom: 10px;
  }
  .erase-banner.show { display: block; }
  body.erasing .lot .cell, body.erasing .lot2 .cell { cursor: pointer; }
  body.erasing .cell input { cursor: pointer; }

  .lot-scroll { overflow-x: auto; padding-bottom: 4px; }
  .lot {
    display: grid; grid-template-columns: repeat(12, minmax(52px, 1fr));
    border: 1.5px solid var(--line); min-width: 640px; background: var(--card);
  }
  .lot .cell { border: .5px solid var(--line); height: 52px; display: flex; align-items: center; justify-content: center; }
  .col-labels {
    display: grid; grid-template-columns: repeat(12, minmax(52px, 1fr));
    min-width: 640px; margin-top: 2px;
  }
  .col-labels div { text-align: center; font-weight: 700; font-size: .9rem; color: var(--heading); }
  .overflow-label {
    text-align: center; font-weight: 700; font-size: .8rem;
    letter-spacing: 1px; color: var(--heading); margin: 14px 0 4px;
  }
  .lot2 {
    display: grid; grid-template-columns: repeat(7, minmax(88px, 1fr));
    border: 1.5px solid var(--line); min-width: 640px; background: var(--card);
  }
  .lot2 .cell { border: .5px solid var(--line); height: 44px; display: flex; align-items: center; justify-content: center; }
  .cell input {
    width: 100%; height: 100%; border: none; background: transparent;
    text-align: center; font-size: 1.05rem; font-weight: 600; color: var(--ink);
    outline: none; font-variant-numeric: tabular-nums;
  }
  .cell input:focus { background: var(--spot-filled); }
  .cell input:not(:placeholder-shown) { background: var(--spot-filled); }
  .cell.just-erased input { background: var(--red-soft); transition: background .4s; }

  .gas-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(56px, 1fr)); gap: 8px; }
  .gas-btn {
    position: relative; height: 52px;
    border: 1.5px solid var(--line); border-radius: 8px;
    background: var(--card); font-size: 1.15rem; font-weight: 700;
    color: var(--ink); cursor: pointer; font-variant-numeric: tabular-nums;
  }
  .gas-btn:focus-visible { outline: 2px solid var(--green-dark); outline-offset: 2px; }
  .gas-btn.done { background: var(--spot-filled); border-color: var(--green-dark); color: var(--green-dark); }
  .gas-btn.done::after {
    content: ""; position: absolute; left: 8px; right: 8px; top: 50%;
    border-top: 2.5px solid var(--red); transform: rotate(-12deg);
  }
  .gas-summary { text-align: center; font-size: .85rem; color: var(--ink-soft); margin: 12px 0; }
  .gas-summary b { color: var(--heading); }

  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--bar-bg); border-top: 1px solid var(--bar-border);
    padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
    display: flex; gap: 10px; justify-content: center;
  }
  .bar-btn {
    flex: 1; max-width: 260px; padding: 12px;
    font-size: .95rem; font-weight: 600; border-radius: 8px;
    border: 1.5px solid var(--red); background: var(--bar-bg); color: var(--red);
    cursor: pointer;
  }
  .bar-btn.armed { background: var(--red); color: #fff; }
  .bar-btn:focus-visible { outline: 2px solid var(--red); outline-offset: 2px; }
</style>

<header class="app-head">
  <div class="head-row">
    <svg class="logo-crest" viewBox="0 0 360 290" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The Griff logo — Greenwich Connecticut">
      <ellipse cx="180" cy="145" rx="174" ry="140" fill="#ffffff"/>
      <ellipse cx="180" cy="145" rx="171" ry="137" fill="none" stroke="#1e5631" stroke-width="4"/>
      <ellipse cx="180" cy="145" rx="158" ry="124" fill="none" stroke="#1e5631" stroke-width="2.5"/>
      <path id="crest-top-arc" d="M 48 145 A 132 98 0 0 1 312 145" fill="none"/>
      <path id="crest-bot-arc" d="M 46 145 A 134 100 0 0 0 314 145" fill="none"/>
      <text font-family="Georgia, 'Times New Roman', serif" font-weight="bold" font-size="31" fill="#1e5631" letter-spacing="8">
        <textPath href="#crest-top-arc" startOffset="50%" text-anchor="middle">THE GRIFF</textPath>
      </text>
      <text font-family="Georgia, 'Times New Roman', serif" font-weight="bold" font-size="15.5" fill="#1e5631" letter-spacing="2.5">
        <textPath href="#crest-bot-arc" startOffset="50%" text-anchor="middle">GREENWICH CONNECTICUT</textPath>
      </text>
      <g stroke="#1e5631" fill="none" stroke-linecap="round">
        <path d="M 88 174 Q 180 154 272 174" stroke-width="4.5"/>
        <path d="M 82 186 Q 180 164 278 186" stroke-width="4.5" stroke-dasharray="13 7"/>
        <path d="M 88 198 Q 180 176 272 198" stroke-width="4.5"/>
        <path d="M 98 209 Q 180 190 262 209" stroke-width="4.5" stroke-dasharray="11 7"/>
        <path d="M 116 218 Q 180 202 244 218" stroke-width="4.5"/>
      </g>
      <g fill="#1e5631">
        <circle cx="122" cy="110" r="17"/>
        <circle cx="138" cy="95" r="21"/>
        <circle cx="160" cy="88" r="22"/>
        <circle cx="181" cy="96" r="19"/>
        <circle cx="192" cy="112" r="15"/>
        <circle cx="158" cy="108" r="24"/>
        <path d="M 151 166 C 152 148 150 140 144 130 L 151 134 C 155 141 156 147 157 152 C 158 147 160 140 165 132 L 171 128 C 163 139 161 148 162 166 Z"/>
      </g>
      <line x1="226" y1="122" x2="226" y2="170" stroke="#1e5631" stroke-width="3.5"/>
      <path d="M 226 122 L 254 131 L 226 141 Z" fill="#d22b2b"/>
    </svg>
    <div>
      <h1>THE GRIFF — Cart Tracker</h1>
      <div class="date" id="today"></div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" data-page="parking">Parking Lot</button>
    <button class="tab" data-page="gas">Gas List</button>
  </div>
</header>

<main>
  <section class="page active" id="page-parking">
    <div class="sheet-title">PARKING LOT</div>
    <div class="hint">Tap a spot and type the cart number parked there</div>
    <div class="lot-tools">
      <button class="erase-btn" id="erase-btn" aria-pressed="false"><span class="x">✕</span> Erase a spot</button>
    </div>
    <div class="erase-banner" id="erase-banner">Erase mode on — tap the cart number to remove it, or tap ✕ again to cancel</div>
    <div class="lot-scroll">
      <div class="lot" id="lot-main"></div>
      <div class="col-labels" id="lot-labels"></div>
      <div class="overflow-label">OVERFLOW ROW</div>
      <div class="lot2" id="lot-overflow"></div>
    </div>
  </section>

  <section class="page" id="page-gas">
    <div class="sheet-title">GAS LIST</div>
    <div class="hint">Tap a cart number to cross it off once it has gas</div>
    <div class="gas-summary" id="gas-summary"></div>
    <div class="gas-grid" id="gas-grid"></div>
  </section>
</main>

<div class="bottom-bar">
  <button class="bar-btn" id="clear-btn">Clear Sheet</button>
</div>

<script>
(function () {
  var COLS = ["A","B","C","D","E","F","G","H","I","J","K","L"];
  var ROWS_PER_COL = 4;
  var OVERFLOW_COLS = 7;
  var OVERFLOW_ROWS = 2;
  var NUM_CARTS = 65;

  var KEY = "griff-cart-tracker";
  var state = load();

  function load() {
    try {
      var s = JSON.parse(localStorage.getItem(KEY));
      if (s && s.parking && s.gas) return s;
    } catch (e) {}
    return { parking: {}, gas: {} };
  }
  function save() {
    try { localStorage.setItem(KEY, JSON.stringify(state)); } catch (e) {}
  }

  document.getElementById("today").textContent =
    new Date().toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric", year: "numeric" });

  /* ---------- Tabs ---------- */
  var tabs = document.querySelectorAll(".tab");
  tabs.forEach(function (tab) {
    tab.addEventListener("click", function () {
      tabs.forEach(function (t) { t.classList.remove("active"); });
      tab.classList.add("active");
      document.querySelectorAll(".page").forEach(function (p) { p.classList.remove("active"); });
      document.getElementById("page-" + tab.dataset.page).classList.add("active");
      setEraseMode(false);
      disarmClear();
    });
  });

  /* ---------- Erase mode ---------- */
  var eraseMode = false;
  var eraseBtn = document.getElementById("erase-btn");
  var eraseBanner = document.getElementById("erase-banner");

  function setEraseMode(on) {
    eraseMode = on;
    eraseBtn.classList.toggle("active", on);
    eraseBtn.setAttribute("aria-pressed", on ? "true" : "false");
    eraseBanner.classList.toggle("show", on);
    document.body.classList.toggle("erasing", on);
  }
  eraseBtn.addEventListener("click", function () { setEraseMode(!eraseMode); });

  /* ---------- Parking lot ---------- */
  function makeSpot(id) {
    var cell = document.createElement("div");
    cell.className = "cell";
    var input = document.createElement("input");
    input.type = "text";
    input.inputMode = "numeric";
    input.placeholder = " ";
    input.maxLength = 4;
    input.setAttribute("aria-label", "Parking spot " + id);
    input.value = state.parking[id] || "";
    input.addEventListener("input", function () {
      var v = input.value.trim();
      if (v) state.parking[id] = v;
      else delete state.parking[id];
      save();
    });
    // In erase mode the tap clears the spot instead of opening the keyboard
    cell.addEventListener("pointerdown", function (e) {
      if (!eraseMode) return;
      e.preventDefault();
      if (!input.value) return;
      input.value = "";
      delete state.parking[id];
      save();
      cell.classList.add("just-erased");
      setTimeout(function () { cell.classList.remove("just-erased"); }, 600);
      setEraseMode(false);
    });
    cell.appendChild(input);
    return cell;
  }

  var lotMain = document.getElementById("lot-main");
  for (var r = 1; r <= ROWS_PER_COL; r++) {
    for (var c = 0; c < COLS.length; c++) {
      lotMain.appendChild(makeSpot(COLS[c] + r));
    }
  }

  var labels = document.getElementById("lot-labels");
  COLS.forEach(function (l) {
    var d = document.createElement("div");
    d.textContent = l;
    labels.appendChild(d);
  });

  var lotOverflow = document.getElementById("lot-overflow");
  for (var orow = 1; orow <= OVERFLOW_ROWS; orow++) {
    for (var ocol = 1; ocol <= OVERFLOW_COLS; ocol++) {
      lotOverflow.appendChild(makeSpot("OF" + orow + "-" + ocol));
    }
  }

  /* ---------- Gas list ---------- */
  var gasGrid = document.getElementById("gas-grid");
  var gasSummary = document.getElementById("gas-summary");

  function updateSummary() {
    var done = Object.keys(state.gas).length;
    gasSummary.innerHTML =
      "<b>" + done + "</b> of <b>" + NUM_CARTS + "</b> carts gassed &nbsp;&middot;&nbsp; " +
      "<b>" + (NUM_CARTS - done) + "</b> still need gas";
  }

  for (var n = 1; n <= NUM_CARTS; n++) {
    (function (num) {
      var btn = document.createElement("button");
      btn.className = "gas-btn";
      btn.textContent = num;
      if (state.gas[num]) btn.classList.add("done");
      btn.addEventListener("click", function () {
        if (state.gas[num]) {
          delete state.gas[num];
          btn.classList.remove("done");
        } else {
          state.gas[num] = true;
          btn.classList.add("done");
        }
        save();
        updateSummary();
      });
      gasGrid.appendChild(btn);
    })(n);
  }
  updateSummary();

  /* ---------- Clear sheet (tap twice to confirm) ---------- */
  var clearBtn = document.getElementById("clear-btn");
  var clearArmed = false;
  var clearTimer = null;

  function disarmClear() {
    clearArmed = false;
    clearTimeout(clearTimer);
    clearBtn.classList.remove("armed");
    clearBtn.textContent = "Clear Sheet";
  }

  clearBtn.addEventListener("click", function () {
    var onGas = document.getElementById("page-gas").classList.contains("active");
    if (!clearArmed) {
      clearArmed = true;
      clearBtn.classList.add("armed");
      clearBtn.textContent = "Tap again to clear the " + (onGas ? "Gas List" : "Parking Lot");
      clearTimer = setTimeout(disarmClear, 4000);
      return;
    }
    if (onGas) {
      state.gas = {};
      document.querySelectorAll(".gas-btn").forEach(function (b) { b.classList.remove("done"); });
      updateSummary();
    } else {
      state.parking = {};
      document.querySelectorAll(".cell input").forEach(function (i) { i.value = ""; });
      setEraseMode(false);
    }
    save();
    disarmClear();
  });
})();
</script>
</body>
</html>
