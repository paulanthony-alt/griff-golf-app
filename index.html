<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1e5631">
<title>The Griff — Cart Tracker</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20512%20512'%3E%3Crect%20width='512'%20height='512'%20rx='96'%20fill='%231e5631'/%3E%3Cg%20fill='%23fff'%3E%3Crect%20x='96'%20y='118'%20width='304'%20height='26'%20rx='13'/%3E%3Crect%20x='122'%20y='138'%20width='18'%20height='140'/%3E%3Cpath%20d='M372%20138L392%20138L420%20300L398%20300Z'/%3E%3Crect%20x='160'%20y='200'%20width='26'%20height='100'%20rx='8'/%3E%3Crect%20x='160'%20y='272'%20width='120'%20height='30'%20rx='10'/%3E%3Cpath%20d='M76%20310L436%20310Q448%20310%20448%20322L448%20358Q448%20370%20436%20370L76%20370Q64%20370%2064%20358L64%20322Q64%20310%2076%20310Z'/%3E%3Ccircle%20cx='150'%20cy='386'%20r='46'/%3E%3Ccircle%20cx='368'%20cy='386'%20r='46'/%3E%3C/g%3E%3Ccircle%20cx='150'%20cy='386'%20r='20'%20fill='%231e5631'/%3E%3Ccircle%20cx='368'%20cy='386'%20r='20'%20fill='%231e5631'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
</head>
<body>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --green: #1e5631;
    --green-dark: #143d22;
    --green-head-text: #ffffff;
    --spot-filled: #e8f2ea;
    --line: #4a4a44;
    --paper: #f7f7f2;
    --card: #ffffff;
    --ink: #22221e;
    --ink-soft: #6b6b62;
    --red: #c0392b;
    --red-soft: #fdeeec;
    --bar-bg: #ffffff;
    --bar-border: #ddddd4;
    --heading: #143d22;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --green: #163f24;
      --green-dark: #9fc7ab;
      --spot-filled: #24382a;
      --line: #6b6b60;
      --paper: #191a17;
      --card: #22231f;
      --ink: #e8e8e0;
      --ink-soft: #9a9a8e;
      --red: #e06052;
      --red-soft: #3c2522;
      --bar-bg: #22231f;
      --bar-border: #3a3b34;
      --heading: #9fc7ab;
    }
  }
  :root[data-theme="light"] {
    --green: #1e5631;
    --green-dark: #143d22;
    --spot-filled: #e8f2ea;
    --line: #4a4a44;
    --paper: #f7f7f2;
    --card: #ffffff;
    --ink: #22221e;
    --ink-soft: #6b6b62;
    --red: #c0392b;
    --red-soft: #fdeeec;
    --bar-bg: #ffffff;
    --bar-border: #ddddd4;
    --heading: #143d22;
  }
  :root[data-theme="dark"] {
    --green: #163f24;
    --green-dark: #9fc7ab;
    --spot-filled: #24382a;
    --line: #6b6b60;
    --paper: #191a17;
    --card: #22231f;
    --ink: #e8e8e0;
    --ink-soft: #9a9a8e;
    --red: #e06052;
    --red-soft: #3c2522;
    --bar-bg: #22231f;
    --bar-border: #3a3b34;
    --heading: #9fc7ab;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  header.app-head {
    background: var(--green);
    color: var(--green-head-text);
    padding: 12px 16px 0;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 6px rgba(0,0,0,.25);
  }
  .head-row { display: flex; align-items: center; justify-content: center; gap: 12px; }
  .logo-crest { flex: none; width: 58px; height: 47px; }
  .app-head h1 { font-size: 1.15rem; letter-spacing: .5px; text-align: left; }
  .app-head .date { text-align: left; font-size: .75rem; opacity: .85; margin-top: 2px; }
  .tabs { display: flex; margin-top: 10px; }
  .tab {
    flex: 1; text-align: center; padding: 10px 4px;
    font-size: .95rem; font-weight: 600;
    color: rgba(255,255,255,.7);
    border: none; background: none; cursor: pointer;
    border-bottom: 3px solid transparent;
  }
  .tab.active { color: #fff; border-bottom-color: #fff; }
  .tab:focus-visible { outline: 2px solid #fff; outline-offset: -2px; }

  main { padding: 14px 10px 90px; max-width: 900px; margin: 0 auto; }
  .page { display: none; }
  .page.active { display: block; }

  .sheet-title {
    text-align: center; font-weight: 700; font-size: 1.05rem;
    letter-spacing: 2px; margin-bottom: 4px; color: var(--heading);
  }
  .hint { text-align: center; font-size: .75rem; color: var(--ink-soft); margin-bottom: 12px; }

  .lot-tools { display: flex; justify-content: center; gap: 10px; margin-bottom: 12px; }
  .erase-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 18px;
    font-size: .9rem; font-weight: 600;
    border: 1.5px solid var(--red); border-radius: 8px;
    background: var(--card); color: var(--red);
    cursor: pointer;
  }
  .erase-btn .x { font-size: 1.05rem; font-weight: 700; }
  .erase-btn.active { background: var(--red); color: #fff; }
  .erase-btn:focus-visible { outline: 2px solid var(--red); outline-offset: 2px; }
  .erase-banner {
    display: none;
    text-align: center; font-size: .8rem; font-weight: 600;
    color: var(--red); margin-bottom: 10px;
  }
  .erase-banner.show { display: block; }
  body.spot-mode .lot .cell, body.spot-mode .lot2 .cell { cursor: pointer; }
  body.spot-mode .cell input { cursor: pointer; }

  .lot-summary { text-align: center; font-size: .85rem; color: var(--ink-soft); margin-bottom: 10px; }
  .lot-summary b { color: var(--heading); }
  .lot-summary .broken-count { color: var(--red); font-weight: 700; }

  .cell.broken input { background: var(--red-soft); }
  .cell.broken::before, .cell.broken::after {
    content: ""; position: absolute; pointer-events: none;
    left: 50%; top: 50%;
  }
  .cell.broken::after {
    width: 32px; height: 32px;
    transform: translate(-50%, -50%);
    border: 2.5px solid var(--red); border-radius: 50%;
  }
  .cell.broken::before {
    width: 32px;
    transform: translate(-50%, -50%) rotate(-45deg);
    border-top: 2.5px solid var(--red);
  }

  .lot-scroll { overflow-x: auto; padding-bottom: 4px; }
  .lot {
    display: grid; grid-template-columns: repeat(12, minmax(52px, 1fr));
    border: 1.5px solid var(--line); min-width: 640px; background: var(--card);
  }
  .lot .cell { position: relative; border: .5px solid var(--line); height: 52px; display: flex; align-items: center; justify-content: center; }
  .col-labels {
    display: grid; grid-template-columns: repeat(12, minmax(52px, 1fr));
    min-width: 640px; margin-top: 2px;
  }
  .col-labels div { text-align: center; font-weight: 700; font-size: .9rem; color: var(--heading); }
  .overflow-label {
    text-align: center; font-weight: 700; font-size: .8rem;
    letter-spacing: 1px; color: var(--heading); margin: 14px 0 4px;
  }
  .lot2 {
    display: grid; grid-template-columns: repeat(7, minmax(88px, 1fr));
    border: 1.5px solid var(--line); min-width: 640px; background: var(--card);
  }
  .lot2 .cell { position: relative; border: .5px solid var(--line); height: 44px; display: flex; align-items: center; justify-content: center; }
  .cell input {
    width: 100%; height: 100%; border: none; background: transparent;
    text-align: center; font-size: 1.05rem; font-weight: 600; color: var(--ink);
    outline: none; font-variant-numeric: tabular-nums;
  }
  .cell input:focus { background: var(--spot-filled); }
  .cell input:not(:placeholder-shown) { background: var(--spot-filled); }
  .cell.just-erased input { background: var(--red-soft); transition: background .4s; }

  .gas-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(56px, 1fr)); gap: 8px; }
  .gas-btn {
    position: relative; height: 52px;
    border: 1.5px solid var(--line); border-radius: 8px;
    background: var(--card); font-size: 1.15rem; font-weight: 700;
    color: var(--ink); cursor: pointer; font-variant-numeric: tabular-nums;
  }
  .gas-btn:focus-visible { outline: 2px solid var(--green-dark); outline-offset: 2px; }
  .gas-btn.done { background: var(--spot-filled); border-color: var(--green-dark); color: var(--green-dark); }
  .gas-btn.done::after {
    content: ""; position: absolute; left: 8px; right: 8px; top: 50%;
    border-top: 2.5px solid var(--red); transform: rotate(-12deg);
  }
  .gas-summary { text-align: center; font-size: .85rem; color: var(--ink-soft); margin: 12px 0; }
  .gas-summary b { color: var(--heading); }

  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--bar-bg); border-top: 1px solid var(--bar-border);
    padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
    display: flex; gap: 10px; justify-content: center;
  }
  .bar-btn {
    flex: 1; max-width: 260px; padding: 12px;
    font-size: .95rem; font-weight: 600; border-radius: 8px;
    border: 1.5px solid var(--red); background: var(--bar-bg); color: var(--red);
    cursor: pointer;
  }
  .bar-btn.armed { background: var(--red); color: #fff; }
  .bar-btn:focus-visible { outline: 2px solid var(--red); outline-offset: 2px; }

  /* ---------- Password gate ---------- */
  body.locked { overflow: hidden; }
  .gate {
    position: fixed; inset: 0; z-index: 100;
    background: var(--green);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; padding: 24px; text-align: center;
  }
  .gate.hidden { display: none; }
  .gate-cart { width: 84px; height: 84px; }
  .gate h2 { color: #fff; font-size: 1.15rem; letter-spacing: .5px; text-wrap: balance; }
  .gate p { color: rgba(255,255,255,.82); font-size: .85rem; margin-top: -6px; }
  .gate-form { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 260px; margin-top: 4px; }
  .gate input {
    padding: 14px; font-size: 1.35rem; text-align: center;
    letter-spacing: 8px; font-weight: 700;
    border: none; border-radius: 10px;
    background: #fff; color: #143d22;
    font-variant-numeric: tabular-nums; outline: none;
  }
  .gate input:focus-visible { box-shadow: 0 0 0 3px rgba(255,255,255,.55); }
  .gate button {
    padding: 14px; font-size: 1rem; font-weight: 700;
    border: none; border-radius: 10px; cursor: pointer;
    background: #ffffff; color: var(--green);
  }
  .gate button:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }
  .gate .err { color: #ffd7d2; font-size: .8rem; min-height: 1.1em; font-weight: 600; }
</style>

<main>
  <section class="page active" id="page-parking">
    <div class="sheet-title">PARKING LOT</div>

    <div class="lot-summary" id="lot-summary"></div>
    <div class="lot-tools">
      <button class="erase-btn" id="erase-btn" aria-pressed="false"><span class="x">✕</span> Erase a spot</button>

    <div class="sheet-title">GAS LIST</div>
    <div class="hint">Tap a cart number to cross it off once it has gas</div>

    <div class="gas-grid" id="gas-grid"></div>
  </section>
</main>

<div class="bottom-bar">
  <button class="bar-btn" id="clear-btn">Clear Sheet</button>
</div>

<script>
(function () {
  var COLS = ["A","B","C","D","E","F","G","H","I","J","K","L"];
  var ROWS_PER_COL = 4;
  var OVERFLOW_COLS = 7;
  var OVERFLOW_ROWS = 2;
  var NUM_CARTS = 65;

  /* ===== Firebase config =====
     Paste your Firebase project's web config below (Firebase console →
     Project settings → "Your apps" → SDK setup & configuration → Config).
     Until databaseURL is filled in, the app runs in LOCAL-ONLY mode: it
     saves on this one device and does NOT share between users. */
  var FIREBASE_CONFIG = {
    apiKey: "AIzaSyDluTMJKxZS-USCO9WVYZwEoWJATmJL4qo",
    authDomain: "griff-golf-staff.firebaseapp.com",
    databaseURL: "https://griff-golf-staff-default-rtdb.firebaseio.com",
    projectId: "griff-golf-staff",
    appId: "1:546554343178:web:668cbf1669f2ee257594f3"
  };
  var cloudConfigured = FIREBASE_CONFIG.databaseURL.indexOf("PASTE_PROJECT") === -1;

  var LKEY = "griff-cart-tracker";
  var cloud = false;   // becomes true once Firebase is connected
  var fb = null;       // Firebase helpers, filled in on connect
  var state = cloudConfigured ? { parking: {}, gas: {}, broken: {} } : loadLocal();

  /* element maps so remote updates can re-render the board live */
  var spotInputs = {};
  var spotCells = {};
  var gasButtons = {};

  function loadLocal() {
    try {
      var s = JSON.parse(localStorage.getItem(LKEY));
      if (s && s.parking && s.gas) { if (!s.broken) s.broken = {}; return s; }
    } catch (e) {}
    return { parking: {}, gas: {}, broken: {} };
  }
  function saveLocal() {
    try { localStorage.setItem(LKEY, JSON.stringify(state)); } catch (e) {}
  }

  /* Persist a single path — to the shared cloud when connected,
     otherwise to this device as a fallback. */
  function writePath(path, val) {
    if (cloud) { try { fb.set(fb.ref(fb.db, "board/" + path), val); } catch (e) {} }
    else saveLocal();
  }
  function removePath(path) {
    if (cloud) { try { fb.remove(fb.ref(fb.db, "board/" + path)); } catch (e) {} }
    else saveLocal();
  }

  document.getElementById("today").textContent =
    new Date().toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric", year: "numeric" });

  /* ---------- Tabs ---------- */
  var tabs = document.querySelectorAll(".tab");
  tabs.forEach(function (tab) {
    tab.addEventListener("click", function () {
      tabs.forEach(function (t) { t.classList.remove("active"); });
      tab.classList.add("active");
      document.querySelectorAll(".page").forEach(function (p) { p.classList.remove("active"); });
      document.getElementById("page-" + tab.dataset.page).classList.add("active");
      setMode(null);
      disarmClear();
    });
  });

  /* ---------- Spot modes: erase / broken ---------- */
  var mode = null; // null | "erase" | "broken"
  var eraseBtn = document.getElementById("erase-btn");
  var brokenBtn = document.getElementById("broken-btn");
  var modeBanner = document.getElementById("erase-banner");

  var BANNER_TEXT = {
    erase: "Erase mode on — tap the cart number to remove it, or tap ✕ again to cancel",
    broken: "Unserviceable mode on — tap a cart number to mark it unserviceable (tap a marked one to un-mark it), or tap ⊘ again to cancel"
  };

  function setMode(next) {
    mode = next;
    eraseBtn.classList.toggle("active", mode === "erase");
    eraseBtn.setAttribute("aria-pressed", mode === "erase" ? "true" : "false");
    brokenBtn.classList.toggle("active", mode === "broken");
    brokenBtn.setAttribute("aria-pressed", mode === "broken" ? "true" : "false");
    modeBanner.textContent = mode ? BANNER_TEXT[mode] : "";
    modeBanner.classList.toggle("show", !!mode);
    document.body.classList.toggle("spot-mode", !!mode);
  }
  eraseBtn.addEventListener("click", function () { setMode(mode === "erase" ? null : "erase"); });
  brokenBtn.addEventListener("click", function () { setMode(mode === "broken" ? null : "broken"); });

  /* ---------- Lot summary ---------- */
  var lotSummary = document.getElementById("lot-summary");
  function updateLotSummary() {
    var count = Object.keys(state.parking).length;
    var broken = Object.keys(state.broken).length;
    var text = "<b>" + count + "</b> cart" + (count === 1 ? "" : "s") + " in the lot";
    if (broken > 0) {
      text += " &nbsp;&middot;&nbsp; <span class=\"broken-count\">" + broken + " unserviceable</span>";
    }
    lotSummary.innerHTML = text;
  }

  /* ---------- Parking lot ---------- */
  function makeSpot(id) {
    var cell = document.createElement("div");
    cell.className = "cell";
    var input = document.createElement("input");
    input.type = "text";
    input.inputMode = "numeric";
    input.placeholder = " ";
    input.maxLength = 4;
    input.setAttribute("aria-label", "Parking spot " + id);
    input.value = state.parking[id] || "";
    if (state.broken[id] && input.value) cell.classList.add("broken");
    spotInputs[id] = input;
    spotCells[id] = cell;
    input.addEventListener("input", function () {
      var v = input.value.trim();
      if (v) { state.parking[id] = v; writePath("parking/" + id, v); }
      else {
        delete state.parking[id];
        var wasBroken = state.broken[id];
        delete state.broken[id];
        cell.classList.remove("broken");
        removePath("parking/" + id);
        if (wasBroken) removePath("broken/" + id);
      }
      updateLotSummary();
    });
    // In erase/broken mode the tap acts on the spot instead of opening the keyboard
    cell.addEventListener("pointerdown", function (e) {
      if (!mode) return;
      e.preventDefault();
      if (!input.value) return;
      if (mode === "erase") {
        input.value = "";
        delete state.parking[id];
        var wasBroken = state.broken[id];
        delete state.broken[id];
        cell.classList.remove("broken");
        cell.classList.add("just-erased");
        setTimeout(function () { cell.classList.remove("just-erased"); }, 600);
        removePath("parking/" + id);
        if (wasBroken) removePath("broken/" + id);
      } else {
        if (state.broken[id]) {
          delete state.broken[id];
          cell.classList.remove("broken");
          removePath("broken/" + id);
        } else {
          state.broken[id] = true;
          cell.classList.add("broken");
          writePath("broken/" + id, true);
        }
      }
      updateLotSummary();
      setMode(null);
    });
    cell.appendChild(input);
    return cell;
  }

  var lotMain = document.getElementById("lot-main");
  for (var r = 1; r <= ROWS_PER_COL; r++) {
    for (var c = 0; c < COLS.length; c++) {
      lotMain.appendChild(makeSpot(COLS[c] + r));
    }
  }

  var labels = document.getElementById("lot-labels");
  COLS.forEach(function (l) {
    var d = document.createElement("div");
    d.textContent = l;
    labels.appendChild(d);
  });

  var lotOverflow = document.getElementById("lot-overflow");
  for (var orow = 1; orow <= OVERFLOW_ROWS; orow++) {
    for (var ocol = 1; ocol <= OVERFLOW_COLS; ocol++) {
      lotOverflow.appendChild(makeSpot("OF" + orow + "-" + ocol));
    }
  }
  updateLotSummary();

  /* ---------- Gas list ---------- */
  var gasGrid = document.getElementById("gas-grid");
  var gasSummary = document.getElementById("gas-summary");

  function updateSummary() {
    var done = Object.keys(state.gas).length;
    gasSummary.innerHTML =
      "<b>" + done + "</b> of <b>" + NUM_CARTS + "</b> carts gassed &nbsp;&middot;&nbsp; " +
      "<b>" + (NUM_CARTS - done) + "</b> still need gas";
  }

  for (var n = 1; n <= NUM_CARTS; n++) {
    (function (num) {
      var btn = document.createElement("button");
      btn.className = "gas-btn";
      btn.textContent = num;
      if (state.gas[num]) btn.classList.add("done");
      gasButtons[num] = btn;
      btn.addEventListener("click", function () {
        if (state.gas[num]) {
          delete state.gas[num];
          btn.classList.remove("done");
          removePath("gas/" + num);
        } else {
          state.gas[num] = true;
          btn.classList.add("done");
          writePath("gas/" + num, true);
        }
        updateSummary();
      });
      gasGrid.appendChild(btn);
    })(n);
  }
  updateSummary();

  /* ---------- Clear sheet (tap twice to confirm) ---------- */
  var clearBtn = document.getElementById("clear-btn");
  var clearArmed = false;
  var clearTimer = null;

  function disarmClear() {
    clearArmed = false;
    clearTimeout(clearTimer);
    clearBtn.classList.remove("armed");
    clearBtn.textContent = "Clear Sheet";
  }

  clearBtn.addEventListener("click", function () {
    var onGas = document.getElementById("page-gas").classList.contains("active");
    if (!clearArmed) {
      clearArmed = true;
      clearBtn.classList.add("armed");
      clearBtn.textContent = "Tap again to clear the " + (onGas ? "Gas List" : "Parking Lot");
      clearTimer = setTimeout(disarmClear, 4000);
      return;
    }
    if (onGas) {
      state.gas = {};
      document.querySelectorAll(".gas-btn").forEach(function (b) { b.classList.remove("done"); });
      removePath("gas");
      updateSummary();
    } else {
      state.parking = {};
      state.broken = {};
      document.querySelectorAll(".cell input").forEach(function (i) { i.value = ""; });
      document.querySelectorAll(".cell.broken").forEach(function (c) { c.classList.remove("broken"); });
      setMode(null);
      removePath("parking");
      removePath("broken");
      updateLotSummary();
    }
    disarmClear();
  });

  /* ---------- Live sync ---------- */
  // Re-draw the whole board from `state` (used when a remote change arrives).
  function applyState() {
    Object.keys(spotInputs).forEach(function (id) {
      var input = spotInputs[id], cell = spotCells[id];
      var val = state.parking[id] || "";
      // don't yank the value out from under someone who's mid-edit
      if (document.activeElement !== input) input.value = val;
      cell.classList.toggle("broken", !!(state.broken[id] && input.value));
    });
    Object.keys(gasButtons).forEach(function (num) {
      gasButtons[num].classList.toggle("done", !!state.gas[num]);
    });
    updateLotSummary();
    updateSummary();
  }

  function applyRemote(data) {
    data = data || {};
    state = {
      parking: data.parking || {},
      gas: data.gas || {},
      broken: data.broken || {}
    };
    applyState();
  }
  window.__griffApplyRemote = applyRemote; // debug/testing hook

  // Connect to the shared database (only if a real config was pasted in).
  if (cloudConfigured) {
    var BASE = "https://www.gstatic.com/firebasejs/10.12.5/";
    Promise.all([
      import(BASE + "firebase-app.js"),
      import(BASE + "firebase-database.js")
    ]).then(function (mods) {
      var appMod = mods[0], dbMod = mods[1];
      var app = appMod.initializeApp(FIREBASE_CONFIG);
      var db = dbMod.getDatabase(app);
      fb = { db: db, ref: dbMod.ref, set: dbMod.set, remove: dbMod.remove };
      cloud = true;
      dbMod.onValue(dbMod.ref(db, "board"), function (snap) {
        applyRemote(snap.val());
      });
    }).catch(function () {
      /* SDK blocked or offline — stay in local mode; the app still works
         on this device, it just won't sync until it can reach Firebase. */
    });
  }
})();

/* ---------- Password gate ---------- */
(function () {
  var GATE_KEY = "griff-cart-unlocked";
  var CODE = "203";
  var gate = document.getElementById("gate");
  var form = document.getElementById("gate-form");
  var input = document.getElementById("gate-input");
  var err = document.getElementById("gate-err");

  function unlock() {
    gate.classList.add("hidden");
    document.body.classList.remove("locked");
  }

  var alreadyIn = false;
  try { alreadyIn = localStorage.getItem(GATE_KEY) === "1"; } catch (e) {}

  if (alreadyIn) {
    unlock();
  } else {
    document.body.classList.add("locked");
    setTimeout(function () { input.focus(); }, 60);
  }

  form.addEventListener("submit", function (e) {
    e.preventDefault();
    if (input.value.trim() === CODE) {
      try { localStorage.setItem(GATE_KEY, "1"); } catch (e) {}
      err.textContent = "";
      unlock();
    } else {
      err.textContent = "Incorrect code — try again";
      input.value = "";
      input.focus();
    }
  });
})();
</script>
</body>
</html>
